<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Golden gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#CC8400"/>
    </linearGradient>

    <!-- Radiant background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>

    <!-- Glow effect -->
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="64" height="64" fill="url(#bgGrad)" rx="12"/>

  <!-- Golden spiral -->
  <path d="M 32 32
           Q 32 28, 36 28
           Q 40 28, 40 32
           Q 40 38, 34 38
           Q 26 38, 26 30
           Q 26 20, 36 20
           Q 48 20, 48 32
           Q 48 48, 32 48
           Q 12 48, 12 28
           Q 12 6, 36 6
           Q 60 6, 60 32"
        stroke="url(#goldGrad)"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"
        opacity="0.9"
        filter="url(#iconGlow)"/>

  <!-- Central circle -->
  <circle cx="32" cy="32" r="13"
          fill="none"
          stroke="url(#goldGrad)"
          stroke-width="2"
          opacity="0.6"/>

  <!-- Phi symbol -->
  <text x="32" y="40"
        font-family="Georgia, serif"
        font-size="20"
        font-weight="bold"
        font-style="italic"
        fill="url(#goldGrad)"
        text-anchor="middle"
        filter="url(#iconGlow)">φ</text>

  <!-- Small decorative dots -->
  <circle cx="50" cy="18" r="1.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="14" cy="18" r="1.5" fill="#FFA500" opacity="0.7"/>
  <circle cx="50" cy="46" r="1.5" fill="#FFD700" opacity="0.7"/>
</svg>
